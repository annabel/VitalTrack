# .github/workflows/summary-demo.yml
name: Summary Demo
on: workflow_dispatch

jobs:
  demo:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Write test results summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## Test Results 🧪

          | Test | Status | Duration |
          |------|--------|----------|
          | Unit tests | ✅ Passed | 1m 23s |
          | Integration | ✅ Passed | 3m 45s |
          | E2E | ❌ Failed | 5m 12s |

          ### Coverage

          ```
          Statements: 87.3%
          Branches:   72.1%
          Functions:  91.5%
          ```

          ### Failed Tests

          - `tests/e2e/checkout.spec.ts` — Timeout waiting for payment confirmation
          - `tests/e2e/login.spec.ts` — Expected redirect to dashboard
          EOF

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Write build summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## Build Summary 📦

          | Artifact | Size | Change |
          |----------|------|--------|
          | `app.js` | 142 KB | +2.1 KB |
          | `vendor.js` | 89 KB | -0.3 KB |
          | `styles.css` | 24 KB | +0.5 KB |
          | **Total** | **255 KB** | **+2.3 KB** |

          > Bundle size increased by 0.9% compared to `main`.
          EOF
